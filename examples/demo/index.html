<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QPack — local semantic search</title>
    <style>
      :root {
        --bg: #0b0e14;
        --panel: #141a26;
        --line: #26303f;
        --fg: #e7ecf3;
        --muted: #8a97ab;
        --accent: #5cc8ff;
        --good: #57e08b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--fg);
        font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      header { padding: 28px 24px 14px; border-bottom: 1px solid var(--line); }
      h1 { margin: 0; font-size: 21px; letter-spacing: -0.2px; }
      h1 small { color: var(--muted); font-weight: 400; font-size: 14px; }
      .note { color: var(--muted); font-size: 13px; margin-top: 4px; }
      main { max-width: 780px; margin: 0 auto; padding: 22px 24px; }
      .bar { display: flex; gap: 10px; margin-bottom: 12px; }
      #q {
        flex: 1; background: var(--panel); color: var(--fg);
        border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; font-size: 15px;
      }
      #go {
        background: var(--accent); color: #03263a; border: 0; border-radius: 10px;
        padding: 0 18px; font-weight: 600; cursor: pointer;
      }
      #go:disabled { opacity: 0.5; cursor: default; }
      .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
      .chip {
        background: var(--panel); border: 1px solid var(--line); color: var(--muted);
        border-radius: 999px; padding: 6px 12px; font-size: 12px; cursor: pointer;
      }
      .chip:hover { color: var(--fg); border-color: var(--accent); }
      #status { color: var(--muted); font-size: 13px; min-height: 18px; margin-bottom: 14px; }
      .hit { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; margin-bottom: 11px; }
      .hit-top { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
      .title { color: var(--accent); font-weight: 600; }
      .score { color: var(--good); font-variant-numeric: tabular-nums; font-size: 12px; }
      .snippet { color: #c6cfdd; font-size: 14px; margin: 7px 0 5px; }
      .src { color: var(--muted); font-size: 12px; }
      #meta { color: var(--muted); font-size: 12px; }
      .answer {
        background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--accent);
        border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; font-size: 15px; color: var(--fg);
      }
      .sources-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <header>
      <h1>QPack <small>· semantic search, no backend</small></h1>
      <div class="note">This page downloaded one pack and searches it entirely in your browser. Open DevTools → Network: nothing is sent per query.</div>
      <div class="note" id="meta"></div>
    </header>
    <main>
      <div class="bar">
        <input id="q" type="text" placeholder="Ask about the help center…" autocomplete="off" />
        <button id="go" disabled>Ask</button>
      </div>
      <div class="examples" id="examples"></div>
      <div id="status">loading…</div>
      <div id="results"></div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
