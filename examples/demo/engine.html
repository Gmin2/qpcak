<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QPack — TurboQuant search in WebAssembly</title>
    <style>
      :root {
        --bg: #0b0e14; --panel: #141a26; --line: #26303f; --fg: #e7ecf3;
        --muted: #8a97ab; --accent: #5cc8ff; --good: #57e08b;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--fg);
        font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      header { padding: 28px 24px 14px; border-bottom: 1px solid var(--line); }
      h1 { margin: 0; font-size: 21px; }
      h1 small { color: var(--muted); font-weight: 400; font-size: 14px; }
      .note { color: var(--muted); font-size: 13px; margin-top: 4px; }
      main { max-width: 780px; margin: 0 auto; padding: 22px 24px; }
      .bar { display: flex; gap: 10px; margin-bottom: 16px; }
      #q { flex: 1; background: var(--panel); color: var(--fg); border: 1px solid var(--line);
        border-radius: 10px; padding: 12px 14px; font-size: 15px; }
      #go { background: var(--accent); color: #03263a; border: 0; border-radius: 10px;
        padding: 0 18px; font-weight: 600; cursor: pointer; }
      #go:disabled { opacity: 0.5; cursor: default; }
      #status { color: var(--muted); font-size: 13px; min-height: 18px; margin-bottom: 14px; }
      .hit { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; margin-bottom: 11px; }
      .hit-top { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
      .title { color: var(--accent); font-weight: 600; }
      .score { color: var(--good); font-variant-numeric: tabular-nums; font-size: 12px; }
      .snippet { color: #c6cfdd; font-size: 14px; margin: 7px 0 5px; }
      .src { color: var(--muted); font-size: 12px; }
      #meta { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <h1>QPack <small>· TurboQuant search in WebAssembly</small></h1>
      <div class="note">Compressed vectors are searched entirely in your browser by a WebAssembly engine — no backend.</div>
      <div class="note" id="meta"></div>
    </header>
    <main>
      <div class="bar">
        <input id="q" type="text" placeholder="Ask about the docs…" autocomplete="off" />
        <button id="go" disabled>Search</button>
      </div>
      <div id="status">loading…</div>
      <div id="results"></div>
    </main>
    <script type="module" src="./engine.ts"></script>
  </body>
</html>
